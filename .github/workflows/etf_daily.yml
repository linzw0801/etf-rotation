name: ETF Daily Rotation

on:
  schedule:
    # 北京时间 16:00 (UTC 08:00) 每个交易日收盘后跑
    # GitHub Actions cron 有时延迟 5-15 分钟, 设 15:50 双保险
    - cron: '50 7 * * 1-5'
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run ETF Rotator
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python etf_rotation_cloud.py --feishu

      - name: Upload log on failure
        if: failure()
        run: |
          echo "::error::ETF rotation failed, check workflow log"
          exit 1
