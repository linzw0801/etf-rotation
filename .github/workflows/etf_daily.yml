name: ETF轮动每日选股

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  etf-scan:
    name: 选股计算并发送邮件
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 运行选股器
        id: run_etf
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python etf_rotation_cloud.py --smtp

      - name: 显示运行结果
        if: always()
        run: |
          echo "✅ Workflow 执行完毕"
