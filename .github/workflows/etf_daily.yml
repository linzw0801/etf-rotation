name: ETF轮动每日选股

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  etf-scan:
    name: 选股计算并发送邮件
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 运行选股器
        id: run_etf
        run: |
          python etf_rotation_cloud.py 2>&1 | tee output.txt

      - name: 写入 GitHub Summary
        if: always()
        run: |
          echo '### ETF轮动选股报告' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 通过 SendGrid API 发邮件
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$SENDGRID_API_KEY" ] || [ -z "$EMAIL_TO" ]; then
            echo "⚠ SendGrid 或收件邮箱未配置，跳过"
            exit 0
          fi

          # 读取报告并转义为 JSON
          TEXT=$(cat output.txt | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          HTML=$(cat output.txt | python3 -c "
import sys,json
text = sys.stdin.read()
html = text.replace('\n','<br>')
print(json.dumps(f'<pre style=\"font-family:monospace;background:#f5f5f5;padding:16px;border-radius:8px\">{html}</pre>'))
")

          # 调用 SendGrid API
          curl -s -X POST "https://api.sendgrid.com/v3/mail/send" \
            -H "Authorization: Bearer $SENDGRID_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"personalizations\": [{\"to\": [{\"email\": \"$EMAIL_TO\"}]}],
              \"from\": {\"email\": \"$EMAIL_TO\", \"name\": \"ETF轮动选股器\"},
              \"subject\": \"ETF轮动选股报告 $(date +%m-%d)\",
              \"content\": [
                {\"type\": \"text/plain\", \"value\": $TEXT},
                {\"type\": \"text/html\", \"value\": $HTML}
              ]
            }" && echo "✅ SendGrid 发送成功" || echo "❌ SendGrid 发送失败"
